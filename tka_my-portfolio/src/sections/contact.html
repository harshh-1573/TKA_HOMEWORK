<!-- ==================== CONTACT SECTION ==================== -->
<section id="contact" class="section section-alt">
  <div class="container">
    <div class="section-header scroll-reveal">
      <span class="section-label">Get In Touch</span>
      <h2 class="section-title">Connect With Me</h2>
    </div>

    <div class="contact-grid">
      <!-- Left: Contact Info Cards -->
      <div class="contact-left scroll-reveal delay-100">
        <div class="contact-card">
          <div class="contact-card-icon blue">
            <i data-lucide="mail"></i>
          </div>
          <div>
            <span class="contact-card-label">Email</span>
            <div class="contact-card-value">
              <a href="mailto:gorantiwarharsh@gmail.com">gorantiwarharsh@gmail.com</a>
            </div>
          </div>
        </div>

        <div class="contact-card">
          <div class="contact-card-icon purple">
            <i data-lucide="linkedin"></i>
          </div>
          <div>
            <span class="contact-card-label">LinkedIn</span>
            <div class="contact-card-value">
              <a href="https://linkedin.com/in/harshgorantiwar" target="_blank" rel="noopener noreferrer">linkedin.com/in/harshgorantiwar</a>
            </div>
          </div>
        </div>

        <div class="contact-card">
          <div class="contact-card-icon blue">
            <i data-lucide="github"></i>
          </div>
          <div>
            <span class="contact-card-label">GitHub</span>
            <div class="contact-card-value">
              <a href="https://github.com/harsh-1573" target="_blank" rel="noopener noreferrer">github.com/harsh-1573</a>
            </div>
          </div>
        </div>

        <div class="contact-card">
          <div class="contact-card-icon purple">
            <i data-lucide="map-pin"></i>
          </div>
          <div>
            <span class="contact-card-label">Location</span>
            <div class="contact-card-value">
              <p>Chandrapur, Maharashtra, India</p>
            </div>
          </div>
        </div>
      </div>

      <!-- Right: Contact Form -->
      <div class="contact-right scroll-reveal delay-200">
        <div class="contact-form-wrapper">
          <form id="contact-form" class="contact-form">
            <div class="form-group">
              <label for="contact-name" class="form-label">Full Name</label>
              <input type="text" id="contact-name" name="name" class="form-input" placeholder="Your full name" required>
            </div>
            <div class="form-group">
              <label for="contact-email" class="form-label">Email Address</label>
              <input type="email" id="contact-email" name="email" class="form-input" placeholder="your@email.com" required>
            </div>
            <div class="form-group">
              <label for="contact-message" class="form-label">Your Message</label>
              <textarea id="contact-message" name="message" class="form-textarea" rows="5" placeholder="Write your message here..." required></textarea>
            </div>
            <button type="submit" id="form-submit-btn" class="btn-submit">
              <i data-lucide="send"></i>
              Send Message
            </button>
          </form>

          <div id="form-success">
            <div class="success-icon">
              <i data-lucide="check-circle"></i>
            </div>
            <h3 class="success-title">Message Sent!</h3>
            <p class="success-text">Message sent successfully! I'll get back to you soon.</p>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
