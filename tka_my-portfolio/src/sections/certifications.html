<!-- ==================== CERTIFICATIONS SECTION ==================== -->
<section id="certifications" class="section section-alt">
  <div class="container">
    <div class="section-header scroll-reveal">
      <span class="section-label">Credentials</span>
      <h2 class="section-title">Certifications &amp; Training</h2>
    </div>

    <div class="cert-grid">
      <!-- Card: Code Unnati Advanced Course -->
      <div class="cert-card scroll-reveal delay-100">
        <div class="cert-card-accent"></div>
        <div class="cert-header">
          <div class="cert-icon">
            <i data-lucide="award"></i>
          </div>
          <div>
            <h3 class="cert-title">Code Unnati Advanced Course</h3>
            <p class="cert-provider">SAP, Code Unnati Initiative</p>
          </div>
        </div>
        <div class="cert-topics">
          <span class="cert-topics-label">Key Topics Covered:</span>
          <div class="cert-topics-list">
            <span class="cert-topic-tag">Machine Learning</span>
            <span class="cert-topic-tag">Deep Learning</span>
            <span class="cert-topic-tag">Internet of Things (IoT)</span>
            <span class="cert-topic-tag">Computer Vision</span>
            <span class="cert-topic-tag">SAP ABAP on Business Technology Platform (BTP)</span>
          </div>
        </div>
        <div class="cert-footer">
          <div class="cert-credential">
            <i data-lucide="hash" style="width: 12px; height: 12px; display: inline;"></i>
            <span>Credential: SAP-CU-2025</span>
          </div>
          <div style="display: flex; align-items: center; gap: 0.75rem; flex-wrap: wrap;">
            <span class="cert-verified">
              <i data-lucide="badge-check" style="width: 14px; height: 14px; display: inline; vertical-align: middle;"></i>
              Verified
            </span>
            <button class="btn-cert-preview" id="toggle-cert-btn" aria-label="Toggle Certificate Preview">
              <i data-lucide="eye" id="cert-eye-icon" style="width: 14px; height: 14px;"></i>
              <span id="cert-toggle-text">Show Certificate</span>
            </button>
            <a href="public/HARSH MAROTI GORANTIWAR_CODE_UNNATI.pdf" target="_blank" class="cert-link" style="display: flex; align-items: center; gap: 4px; text-decoration: none; color: var(--primary-blue); font-weight: 700; text-transform: uppercase; font-size: 12px; letter-spacing: 0.1em;" title="Open in new tab">
              <i data-lucide="external-link" style="width: 14px; height: 14px; display: inline; vertical-align: middle;"></i>
              Open
            </a>
          </div>
        </div>
        <!-- Collapsible Preview Frame -->
        <div id="cert-preview-container" class="cert-preview-container">
          <iframe src="public/HARSH MAROTI GORANTIWAR_CODE_UNNATI.pdf" class="cert-iframe" title="Code Unnati Certificate Preview"></iframe>
        </div>
      </div>
    </div>
  </div>
</section>
